services:
  # ── Backend: Spring Boot (Docker) ──────────────────────
  - type: web
    name: course-recommender-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DB_URL
        value: jdbc:mysql://mysql-375dc89b-practise123.a.aivencloud.com:22786/defaultdb?sslMode=REQUIRED
      - key: DB_USER
        value: avnadmin
      - key: DB_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: 396278717491-u2r9lbc1psc9oqm8qc08s2uttp0a3jq4.apps.googleusercontent.com
      - key: JWT_SECRET
        value: course-rec-secret-key-2024-production

  # ── Frontend: React Static Site ───────────────────────
  - type: web
    name: course-recommender-ui
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    rootDir: ./frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://course-recommender-api.onrender.com/api
      - key: REACT_APP_GOOGLE_CLIENT_ID
        value: 396278717491-u2r9lbc1psc9oqm8qc08s2uttp0a3jq4.apps.googleusercontent.com

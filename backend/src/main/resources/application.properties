# Application
spring.application.name=course-recommender
server.port=${PORT:8080}

# MySQL DataSource — reads env vars set on Render; falls back to local dev values
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/course_recommender?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:2006}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.com.recommender=INFO

# Application
spring.application.name=course-recommender
server.port=${PORT:8080}

# MySQL DataSource — reads env vars set on Render; falls back to Aiven
spring.datasource.url=${DB_URL:jdbc:mysql://mysql-375dc89b-practise123.a.aivencloud.com:22786/defaultdb?sslMode=REQUIRED}
spring.datasource.username=${DB_USER:avnadmin}
spring.datasource.password=${DB_PASS:INSERT_PASSWORD_HERE}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.com.recommender=INFO

# Google OAuth2 — set in Render dashboard
google.client.id=${GOOGLE_CLIENT_ID:396278717491-u2r9lbc1psc9oqm8qc08s2uttp0a3jq4.apps.googleusercontent.com}

# JWT — set a strong secret in Render dashboard
jwt.secret=${JWT_SECRET:course-recommender-super-secret-key-change-in-production-2024}
jwt.expiration.ms=86400000

# YouTube Data API v3 — set YOUTUBE_API_KEY in Render dashboard
# Get your free key at: https://console.cloud.google.com -> APIs -> YouTube Data API v3
youtube.api.key=${YOUTUBE_API_KEY:}
